spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    function:
      definition: paymentCreationAcknowledgement;updateOrderStatus;orderCreationAcknowledgement
    stream:
      bindings:
        orderCreatedEvent-out-0:
          destination: order.created
        orderNotificationEvent-out-0:
          destination: notify.created
        paymentCreationAcknowledgement-in-0:
          destination: payment.ack
        orderCreationAcknowledgement-in-0:
          destination: notify.ack
        updateOrderStatus-in-0:
          destination: payment.success
        default:
          content-type: application/json
          group: ${spring.application.name}
#  flyway:
#    enabled: true
#    baseline-on-migrate: true
server:
  port: 8082
