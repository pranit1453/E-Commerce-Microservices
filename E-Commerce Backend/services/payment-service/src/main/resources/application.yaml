spring:
  application:
    name: payment-service

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    function:
      definition: createPaymentAsOrderCreated
    stream:
      bindings:
        createPaymentAsOrderCreated-in-0:
          destination: order.created
        createPaymentAsOrderCreated-out-0:
          destination: payment.ack
        default:
          content-type: application/json
          group: ${spring.application.name}
server:
  port: 8084
