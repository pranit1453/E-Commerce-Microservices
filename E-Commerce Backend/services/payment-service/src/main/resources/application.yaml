spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    function:
      definition: createPaymentAsOrderCreated
    stream:
      bindings:
        createPaymentAsOrderCreated-in-0:
          destination: order.created
        createPaymentAsOrderCreated-out-0:
          destination: payment.ack
        paymentSuccessEvent-out-0:
          destination: payment.success
        default:
          content-type: application/json
          group: ${spring.application.name}
server:
  port: 8084

signature:
  key: i4tfI66PYK9wEcfrvxq6jLozkksK5YBt+i7u0w14xF4=